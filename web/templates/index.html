<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wayt — Fill Your Tables Faster</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/static/i18n/translations.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    html { scroll-behavior: smooth; }
    body { background: #f0f4ff; }
    .hero-bg {
      background: linear-gradient(160deg, #eef4ff 0%, #e8f5f0 50%, #eaf6ff 100%);
    }
    .section-light { background: #ffffff; }
    .section-soft { background: #f6f9ff; }
    .gradient-text {
      background: linear-gradient(135deg, #16a34a, #0284c7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .card-white {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .card-white:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
    .btn-green {
      background: #22c55e;
      color: #fff;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-green:hover { background: #16a34a; }
    .btn-blue {
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn-blue:hover { background: #1d4ed8; }
    .cta-banner {
      background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 50%, #22c55e 100%);
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .float { animation: float 4s ease-in-out infinite; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fade-up { animation: fadeUp 0.6s ease forwards; }
    .nav-shadow { box-shadow: 0 1px 12px rgba(0,0,0,0.08); }
    .blob1 { position:absolute; width:400px; height:400px; background:radial-gradient(circle, rgba(34,197,94,0.12) 0%, transparent 70%); border-radius:50%; top:-80px; right:-80px; pointer-events:none; }
    .blob2 { position:absolute; width:300px; height:300px; background:radial-gradient(circle, rgba(6,182,212,0.10) 0%, transparent 70%); border-radius:50%; bottom:-60px; left:-60px; pointer-events:none; }
    .step-num {
      background: linear-gradient(135deg, #22c55e, #0ea5e9);
      color: #fff;
      font-weight: 800;
    }
    .popular-badge {
      background: linear-gradient(135deg, #22c55e, #0ea5e9);
    }
  </style>
</head>
<body x-data="page()" x-init="init()">

<!-- ===== NAVBAR ===== -->
<nav class="fixed top-0 w-full z-50 bg-white/95 nav-shadow backdrop-blur">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3.5 flex items-center justify-between">
    <a href="#" class="flex items-center gap-2">
      <div class="w-8 h-8 bg-gradient-to-br from-green-500 to-cyan-500 rounded-lg flex items-center justify-center font-black text-white text-sm">W</div>
      <span class="font-bold text-lg text-slate-800">Wayt</span>
    </a>
    <div class="hidden md:flex items-center gap-8 text-sm text-slate-600">
      <a href="#features" :class="activeSection==='features' ? 'text-green-600 font-medium border-b-2 border-green-500 pb-0.5' : 'hover:text-green-600'" class="transition" x-text="t('nav_features')"></a>
      <a href="#how-it-works" :class="activeSection==='how-it-works' ? 'text-green-600 font-medium border-b-2 border-green-500 pb-0.5' : 'hover:text-green-600'" class="transition" x-text="t('nav_how_it_works')"></a>
      <a href="#pricing" :class="activeSection==='pricing' ? 'text-green-600 font-medium border-b-2 border-green-500 pb-0.5' : 'hover:text-green-600'" class="transition" x-text="t('nav_pricing')"></a>
      <a href="#contact" :class="activeSection==='contact' ? 'text-green-600 font-medium border-b-2 border-green-500 pb-0.5' : 'hover:text-green-600'" class="transition" x-text="t('nav_contact')"></a>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1">
        <button @click="setLocale('id')" :class="locale==='id' ? 'font-bold text-green-600' : 'text-slate-400'" class="text-xs px-1 transition">ID</button>
        <span class="text-slate-300 text-xs">|</span>
        <button @click="setLocale('en')" :class="locale==='en' ? 'font-bold text-green-600' : 'text-slate-400'" class="text-xs px-1 transition">EN</button>
      </div>
      <a href="#get-started" class="btn-blue text-sm px-5 py-2.5 rounded-xl shadow-sm" x-text="t('nav_get_started')"></a>
    </div>
  </div>
</nav>

<!-- ===== HERO ===== -->
<section class="hero-bg min-h-screen flex items-center pt-20 relative overflow-hidden">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div class="max-w-6xl mx-auto px-4 sm:px-6 py-20 grid md:grid-cols-2 gap-12 items-center relative z-10">
    <div class="fade-up">
      <div class="flex gap-2 mb-6 flex-wrap">
        <template x-for="r in ['🍣 Sushi House','🔥 Grill & Chill','🌊 Ocean View Cafe']">
          <span class="text-xs bg-white border border-slate-200 rounded-full px-3 py-1 text-slate-600 shadow-sm font-medium" x-text="r"></span>
        </template>
      </div>

      <h1 class="text-4xl sm:text-5xl font-extrabold leading-tight text-slate-900 mb-5"
        x-text="settings.hero_title || 'Fill Your Tables Faster, Increase Your Revenue'"></h1>
      <p class="text-slate-500 text-lg mb-8 leading-relaxed"
        x-text="settings.hero_subtitle || 'Smart reservation & queue management system to help you maximize table utilization and boost your business efficiency.'"></p>

      <div class="flex flex-wrap gap-4 mb-6">
        <a href="#get-started" class="btn-green px-7 py-3.5 rounded-xl shadow-md text-sm"
          x-text="settings.hero_cta || 'Get Started'"></a>
        <a href="#how-it-works" class="flex items-center gap-2 border-2 border-slate-300 text-slate-700 font-semibold px-7 py-3.5 rounded-xl hover:border-green-500 hover:text-green-600 transition text-sm bg-white">
          <svg class="w-4 h-4 text-green-500" fill="currentColor" viewBox="0 0 20 20">
            <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
          </svg>
          <span x-text="t('hero_watch_demo')"></span>
        </a>
      </div>
      <p class="text-slate-400 text-xs" x-text="t('hero_trial_note')"></p>
    </div>

    <!-- Dashboard mockup -->
    <div class="relative float hidden md:block">
      <div class="card-white rounded-2xl p-5">
        <div class="flex items-center gap-2 mb-4">
          <div class="w-3 h-3 rounded-full bg-red-400"></div>
          <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
          <div class="w-3 h-3 rounded-full bg-green-400"></div>
          <span class="ml-2 text-xs text-slate-400 font-medium">Daily Overview</span>
        </div>
        <div class="grid grid-cols-3 gap-3 mb-4">
          <div class="bg-green-50 border border-green-100 rounded-xl p-3 text-center">
            <p class="text-2xl font-extrabold text-green-600">843</p>
            <p class="text-xs text-slate-400 mt-1">Reservations</p>
          </div>
          <div class="bg-blue-50 border border-blue-100 rounded-xl p-3 text-center">
            <p class="text-2xl font-extrabold text-blue-600">83%</p>
            <p class="text-xs text-slate-400 mt-1">Utilization</p>
          </div>
          <div class="bg-cyan-50 border border-cyan-100 rounded-xl p-3 text-center">
            <p class="text-2xl font-extrabold text-cyan-600">+220k</p>
            <p class="text-xs text-slate-400 mt-1">Revenue</p>
          </div>
        </div>
        <div class="space-y-2">
          <template x-for="(pct, idx) in [85,60,90,45,70]" :key="idx">
            <div class="flex items-center gap-3">
              <div class="w-14 text-xs text-slate-400" x-text="['12:00','13:00','14:00','15:00','16:00'][idx]"></div>
              <div class="flex-1 bg-slate-100 rounded-full h-2">
                <div class="h-2 rounded-full bg-gradient-to-r from-green-500 to-cyan-500" :style="'width:'+pct+'%'"></div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ===== FEATURES ===== -->
<section id="features" class="py-24 section-light">
  <div class="max-w-6xl mx-auto px-4 sm:px-6">
    <div class="text-center mb-16">
      <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-4">
        <span x-text="t('section_features_title_1')"></span><br/><span class="gradient-text" x-text="t('section_features_title_2') + ' ' + t('section_features_title_3')"></span>
      </h2>
      <p class="text-slate-500 max-w-xl mx-auto" x-text="t('section_features_sub')"></p>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-16">
      <template x-for="f in features" :key="f.title">
        <div class="card-white rounded-2xl p-6 transition group cursor-default">
          <div class="w-12 h-12 bg-green-50 rounded-xl flex items-center justify-center mb-4" x-html="f.icon"></div>
          <h3 class="font-bold text-slate-800 mb-2" x-text="f.title"></h3>
          <p class="text-slate-500 text-sm leading-relaxed" x-text="f.desc"></p>
        </div>
      </template>
    </div>

    <!-- Dashboard showcase -->
    <div class="grid md:grid-cols-2 gap-12 items-center">
      <div>
        <h3 class="text-2xl sm:text-3xl font-extrabold text-slate-900 mb-4">
          <span x-text="t('dash_title_1')"></span><br/><span class="gradient-text" x-text="t('dash_title_2')"></span>
        </h3>
        <p class="text-slate-500 mb-8" x-text="t('dash_sub')"></p>
        <div class="space-y-4">
          <template x-for="item in dashboardFeatures" :key="item.title">
            <div class="flex items-start gap-3">
              <div class="w-8 h-8 bg-green-50 rounded-lg flex items-center justify-center flex-shrink-0 mt-0.5" x-html="item.icon"></div>
              <div>
                <p class="font-semibold text-slate-800 text-sm" x-text="item.title"></p>
                <p class="text-slate-500 text-xs mt-0.5" x-text="item.desc"></p>
              </div>
            </div>
          </template>
        </div>
      </div>
      <div class="card-white rounded-2xl p-6">
        <div class="flex items-center justify-between mb-5">
          <div class="flex items-center gap-2">
            <div class="w-6 h-6 bg-gradient-to-br from-green-500 to-cyan-500 rounded-md flex items-center justify-center font-black text-white text-xs">W</div>
            <span class="text-sm font-semibold text-slate-700">Wayt Dashboard</span>
          </div>
          <span class="text-xs text-green-600 bg-green-50 border border-green-100 px-2 py-1 rounded-full font-medium" x-text="t('dash_live')"></span>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div class="bg-green-50 border border-green-100 rounded-xl p-3">
            <p class="text-xs text-slate-500" x-text="t('dash_today_tables')"></p>
            <p class="text-2xl font-extrabold text-green-600 mt-1">24</p>
          </div>
          <div class="bg-cyan-50 border border-cyan-100 rounded-xl p-3">
            <p class="text-xs text-slate-500" x-text="t('dash_waitlist')"></p>
            <p class="text-2xl font-extrabold text-cyan-600 mt-1">7</p>
          </div>
        </div>
        <div class="space-y-2">
          <template x-for="t in mockTables">
            <div class="flex items-center justify-between bg-slate-50 border border-slate-100 rounded-lg px-3 py-2">
              <span class="text-xs text-slate-600" x-text="t.name"></span>
              <span class="text-xs px-2 py-0.5 rounded-full font-medium"
                :class="t.occupied?'bg-red-50 text-red-500 border border-red-100':'bg-green-50 text-green-600 border border-green-100'"
                x-text="t.status"></span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ===== HOW IT WORKS ===== -->
<section id="how-it-works" class="py-24 section-soft">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 text-center">
    <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-4">
      <span x-text="t('how_title_1')"></span><br/><span class="gradient-text" x-text="t('how_title_2')"></span>
    </h2>
    <p class="text-slate-500 mb-16" x-text="t('how_sub')"></p>
    <div class="grid md:grid-cols-3 gap-8">
      <template x-for="(step, i) in steps" :key="i">
        <div class="card-white rounded-2xl p-7">
          <div class="w-12 h-12 step-num rounded-2xl flex items-center justify-center text-lg mx-auto mb-5 shadow-md" x-text="i+1"></div>
          <h3 class="font-bold text-slate-800 mb-2" x-text="step.title"></h3>
          <p class="text-slate-500 text-sm" x-text="step.desc"></p>
        </div>
      </template>
    </div>
  </div>
</section>

<!-- ===== PRICING ===== -->
<section id="pricing" class="py-24 section-light">
  <div class="max-w-5xl mx-auto px-4 sm:px-6">
    <div class="text-center mb-12">
      <h2 class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-4"><span x-text="t('pricing_title_1')"></span> <span class="gradient-text" x-text="t('pricing_title_2')"></span></h2>
      <p class="text-slate-500 mb-8" x-text="t('pricing_sub')"></p>
      <div class="inline-flex items-center gap-1 bg-slate-100 border border-slate-200 rounded-xl p-1">
        <button @click="billing='monthly'"
          :class="billing==='monthly' ? 'bg-white shadow text-slate-800' : 'text-slate-500'"
          class="px-5 py-2 rounded-lg text-sm font-medium transition" x-text="t('billing_monthly')"></button>
        <button @click="billing='yearly'"
          :class="billing==='yearly' ? 'btn-green shadow' : 'text-slate-500'"
          class="px-5 py-2 rounded-lg text-sm font-medium transition">
          <span x-text="t('billing_yearly')"></span> <span class="text-xs opacity-80" x-text="'(' + t('billing_yearly_save') + ')'"></span>
        </button>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-6">
      <template x-for="plan in pricing" :key="plan.id">
        <div class="relative rounded-2xl p-7 flex flex-col transition"
          :class="plan.is_popular
            ? 'bg-white border-2 border-green-400 shadow-xl shadow-green-100'
            : 'card-white'">
          <div x-show="plan.is_popular"
            class="popular-badge absolute -top-3.5 left-1/2 -translate-x-1/2 text-white text-xs font-bold px-4 py-1.5 rounded-full shadow"
            x-text="t('most_popular')">
          </div>
          <h3 class="font-extrabold text-xl text-slate-800 mb-2" x-text="plan.name"></h3>
          <div class="mb-1">
            <span class="text-3xl font-extrabold text-slate-900"
              x-text="'Rp ' + formatPrice(billing==='monthly' ? plan.price_monthly : plan.price_yearly)"></span>
            <span class="text-slate-400 text-sm" x-text="t('per_month')"></span>
          </div>
          <p x-show="billing==='yearly'" class="text-xs text-slate-400 mb-4"
            x-text="'(≈ Rp ' + formatPrice(Math.round((billing==='yearly' ? plan.price_yearly : plan.price_monthly) / 12)) + ' rb/month)'"></p>
          <ul class="space-y-2.5 mb-8 flex-1 mt-3">
            <template x-for="feat in plan.features" :key="feat">
              <li class="flex items-start gap-2 text-sm text-slate-600">
                <svg class="w-4 h-4 text-green-500 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
                </svg>
                <span x-text="feat"></span>
              </li>
            </template>
          </ul>
          <a href="#get-started"
            :class="plan.is_popular ? 'btn-green shadow-lg' : 'border-2 border-slate-300 text-slate-700 hover:border-green-500 hover:text-green-600 bg-white'"
            class="block text-center py-3 rounded-xl text-sm font-semibold transition"
            x-text="t('plan_cta')">
          </a>
        </div>
      </template>
    </div>

    <!-- Trusted by -->
    <div class="mt-20 text-center">
      <p class="text-slate-500 text-sm mb-8 font-semibold uppercase tracking-wider" x-text="t('trusted_title')"></p>
      <div class="flex flex-wrap justify-center gap-4">
        <template x-for="r in trustedBy" :key="r.id">
          <div class="flex items-center gap-2.5 bg-white border border-slate-200 rounded-xl px-4 py-3 shadow-sm">
            <span class="text-lg" x-text="r.emoji"></span>
            <div class="text-left">
              <p class="text-sm font-semibold text-slate-700" x-text="r.name"></p>
              <p class="text-xs text-yellow-500" x-text="'★ ' + r.rating"></p>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</section>

<!-- ===== TESTIMONIAL ===== -->
<section class="py-20 section-soft">
  <div class="max-w-3xl mx-auto px-4 sm:px-6">
    <template x-for="t in testimonials.slice(0,1)" :key="t.id">
      <div class="card-white rounded-2xl p-8">
        <div class="flex items-start gap-5">
          <div class="w-14 h-14 bg-gradient-to-br from-green-500 to-cyan-500 rounded-full flex items-center justify-center font-bold text-white text-xl flex-shrink-0" x-text="t.name[0]"></div>
          <div class="flex-1">
            <div class="flex gap-0.5 mb-3">
              <template x-for="i in t.rating">
                <svg class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                  <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                </svg>
              </template>
            </div>
            <blockquote class="text-slate-700 text-base leading-relaxed mb-4" x-text="t.quote"></blockquote>
            <div class="flex items-center gap-4 flex-wrap">
              <div>
                <p class="font-semibold text-slate-800 text-sm" x-text="t.name"></p>
                <p class="text-slate-500 text-xs" x-text="t.restaurant"></p>
              </div>
              <a x-show="t.phone" :href="'tel:' + t.phone"
                class="text-xs text-green-600 hover:text-green-700 font-medium" x-text="'✆ ' + t.phone"></a>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
</section>

<!-- ===== GET STARTED FORM ===== -->
<section id="get-started" class="cta-banner py-20">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 grid md:grid-cols-2 gap-12 items-center">
    <!-- Left: copy -->
    <div class="text-white">
      <h2 class="text-3xl sm:text-4xl font-extrabold mb-4"
        x-text="settings.cta_title || 'Ready to Boost Your Restaurant\'s Revenue?'"></h2>
      <p class="text-white/80 text-lg mb-8"
        x-text="settings.cta_subtitle || 'Try Wayt free for 14 days and see the difference!'"></p>
      <ul class="space-y-3">
        <template x-for="item in [t('cta_item_1'), t('cta_item_2'), t('cta_item_3'), t('cta_item_4')]">
          <li class="flex items-center gap-3 text-white/90 text-sm">
            <svg class="w-5 h-5 text-white flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
            </svg>
            <span x-text="item"></span>
          </li>
        </template>
      </ul>
    </div>

    <!-- Right: form -->
    <div class="bg-white rounded-2xl p-8 shadow-2xl">
      <h3 class="font-extrabold text-slate-800 text-xl mb-6" x-text="t('form_title')"></h3>

      <!-- Success state -->
      <div x-show="leadSuccess" class="text-center py-6">
        <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <p class="font-bold text-slate-800 text-lg mb-2" x-text="t('success_title')"></p>
        <p class="text-slate-500 text-sm" x-text="t('success_msg')"></p>
      </div>

      <!-- Form -->
      <form x-show="!leadSuccess" @submit.prevent="submitLead()" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1" x-text="t('form_name_label')"></label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
            <input x-model="leadForm.full_name" type="text" placeholder="Andi Susanto"
              class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100" required />
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1" x-text="t('form_restaurant_label')"></label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            <input x-model="leadForm.restaurant_name" type="text" placeholder="Warung Sate ABC"
              class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100" required />
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1" x-text="t('form_email_label')"></label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            <input x-model="leadForm.email" type="email" placeholder="andi@restoran.com"
              class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100" required />
          </div>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-600 mb-1" x-text="t('form_phone_label')"></label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
            <input x-model="leadForm.phone" type="tel" placeholder="+62 811-1234-5678"
              class="w-full border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm text-slate-800 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100" />
          </div>
        </div>
        <div x-show="leadError" class="text-red-500 text-sm" x-text="leadError"></div>
        <button type="submit" :disabled="leadLoading"
          class="btn-green w-full py-3.5 rounded-xl text-sm shadow-md disabled:opacity-60 mt-2">
          <span x-show="!leadLoading" x-text="t('form_submit')"></span>
          <span x-show="leadLoading" x-text="t('form_submitting')"></span>
        </button>
        <p class="text-center text-slate-400 text-xs" x-text="t('form_no_cc')"></p>
      </form>
    </div>
  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer id="contact" class="bg-white border-t border-slate-200 py-8">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 bg-gradient-to-br from-green-500 to-cyan-500 rounded-lg flex items-center justify-center font-black text-white text-xs">W</div>
      <span class="font-bold text-slate-700">Wayt</span>
    </div>
    <div class="flex flex-wrap gap-6 text-slate-500 text-xs">
      <span class="flex items-center gap-1.5">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
        <span x-text="settings.footer_secure || '100% Secure & Reliable'"></span>
      </span>
      <a :href="'tel:' + settings.hero_phone" class="flex items-center gap-1.5 hover:text-green-600 transition">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        <span x-text="settings.hero_phone || '+62 811-1234-5678'"></span>
      </a>
      <span class="flex items-center gap-1.5">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        <span x-text="settings.footer_support || 'Friendly Customer Support'"></span>
      </span>
      <span class="flex items-center gap-1.5">
        <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
        <span x-text="settings.footer_whatsapp || 'Easy WhatsApp Integration'"></span>
      </span>
    </div>
  </div>
</footer>

<script>
function page() {
  return {
    locale: localStorage.getItem('locale') || 'id',
    t(key) { return (window.TRANSLATIONS[this.locale] && window.TRANSLATIONS[this.locale][key]) || key },
    setLocale(lang) { this.locale = lang; localStorage.setItem('locale', lang) },

    activeSection: '',
    billing: 'monthly',
    pricing: [],
    testimonials: [],
    settings: {},
    leadForm: { full_name: '', restaurant_name: '', email: '', phone: '' },
    leadLoading: false,
    leadError: '',
    leadSuccess: false,

    get features() {
      return [
        { title: this.t('feat_1_title'), desc: this.t('feat_1_desc'), icon: '<svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' },
        { title: this.t('feat_2_title'), desc: this.t('feat_2_desc'), icon: '<svg class="w-6 h-6 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>' },
        { title: this.t('feat_3_title'), desc: this.t('feat_3_desc'), icon: '<svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>' },
        { title: this.t('feat_4_title'), desc: this.t('feat_4_desc'), icon: '<svg class="w-6 h-6 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>' },
      ]
    },

    get dashboardFeatures() {
      return [
        { title: this.t('dash_feat_1_title'), desc: this.t('dash_feat_1_desc'), icon: '<svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>' },
        { title: this.t('dash_feat_2_title'), desc: this.t('dash_feat_2_desc'), icon: '<svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>' },
        { title: this.t('dash_feat_3_title'), desc: this.t('dash_feat_3_desc'), icon: '<svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>' },
      ]
    },

    get steps() {
      return [
        { title: this.t('step_1_title'), desc: this.t('step_1_desc') },
        { title: this.t('step_2_title'), desc: this.t('step_2_desc') },
        { title: this.t('step_3_title'), desc: this.t('step_3_desc') },
      ]
    },

    get mockTables() {
      return [
        { name: 'Table A1 — 12:00', occupied: true,  status: this.t('dash_occupied') },
        { name: 'Table B2 — 12:30', occupied: false, status: this.t('dash_available') },
        { name: 'Table C1 — 13:00', occupied: true,  status: this.t('dash_occupied') },
        { name: 'Table A3 — 13:30', occupied: false, status: this.t('dash_available') },
      ]
    },

    trustedBy: [],

    async init() {
      await Promise.all([
        this.loadPricing(),
        this.loadTestimonials(),
        this.loadSettings(),
        this.loadTrusted(),
      ])
      this.initScrollSpy()
    },

    initScrollSpy() {
      const ids = ['features', 'how-it-works', 'pricing', 'contact']
      const onScroll = () => {
        const scrollBottom = window.scrollY + window.innerHeight
        const docHeight = document.documentElement.scrollHeight
        if (scrollBottom >= docHeight - 80) {
          this.activeSection = 'contact'
          return
        }
        const mid = window.scrollY + window.innerHeight * 0.4
        let current = ''
        ids.forEach(id => {
          const el = document.getElementById(id)
          if (el && el.offsetTop <= mid) current = id
        })
        this.activeSection = current
      }
      window.addEventListener('scroll', onScroll, { passive: true })
      onScroll()
    },

    async loadPricing() {
      try {
        const res = await fetch('/api/pricing')
        const json = await res.json()
        this.pricing = json.data || []
      } catch (_) {}
    },

    async loadTestimonials() {
      try {
        const res = await fetch('/api/testimonials')
        const json = await res.json()
        this.testimonials = json.data || []
      } catch (_) {}
    },

    async loadSettings() {
      try {
        const res = await fetch('/api/settings')
        const json = await res.json()
        this.settings = json.data || {}
      } catch (_) {}
    },

    async loadTrusted() {
      try {
        const res = await fetch('/api/trusted')
        const json = await res.json()
        this.trustedBy = json.data || []
      } catch (_) {}
    },

    async submitLead() {
      this.leadLoading = true
      this.leadError = ''
      try {
        const res = await fetch('/api/leads', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(this.leadForm),
        })
        if (res.ok) {
          this.leadSuccess = true
          this.leadForm = { full_name: '', restaurant_name: '', email: '', phone: '' }
        } else {
          const json = await res.json()
          this.leadError = json.message || this.t('form_error')
        }
      } catch (e) {
        this.leadError = this.t('form_conn_error')
      } finally {
        this.leadLoading = false
      }
    },

    formatPrice(n) {
      if (!n) return '0'
      if (n >= 1000000) return (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + ' jt'
      return Math.round(n / 1000) + ' rb'
    },
  }
}
</script>
</body>
</html>
